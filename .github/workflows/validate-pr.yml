name: Validate PR

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: [main, dev]

jobs:
  branch-name:
    name: Branch convention
    runs-on: ubuntu-latest
    steps:
      - name: Check pattern
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          set -e
          echo "PR: $HEAD → $BASE"
          if [[ "$BASE" == "main" ]]; then
            # vers main: uniquement depuis dev ou hotfix/*
            if [[ "$HEAD" == "dev" ]] || [[ "$HEAD" =~ ^hotfix/ ]]; then
              echo "ok"
            else
              echo "::error::main ne peut recevoir que dev ou hotfix/* (reçu: $HEAD)"
              exit 1
            fi
          elif [[ "$BASE" == "dev" ]]; then
            # vers dev: feat/fix/hotfix/chore/refactor/docs/style/test/perf/config
            if [[ "$HEAD" =~ ^(feat|fix|hotfix|chore|refactor|docs|style|test|perf|config)/(#[0-9]+-)?[a-z0-9-]+$ ]]; then
              echo "ok"
            else
              echo "::error::branche $HEAD ne matche pas <type>/(#N-)<slug> (types: feat|fix|hotfix|chore|refactor|docs|style|test|perf|config)"
              exit 1
            fi
          else
            echo "::warning::base inattendue: $BASE"
          fi

  pr-title:
    name: PR title (conventional)
    runs-on: ubuntu-latest
    steps:
      - name: Check title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # supporte avec ou sans emoji prefix, format: "<type>(<scope>): <desc>"
          if [[ "$TITLE" =~ ^[^A-Za-z]*[[:space:]]*(feat|fix|hotfix|chore|refactor|docs|style|test|perf|config)(\([a-z0-9-]+\))?:[[:space:]].+ ]]; then
            echo "ok: $TITLE"
          else
            echo "::error::titre PR doit suivre '<emoji?> <type>(<scope>): <description>' — reçu: $TITLE"
            exit 1
          fi

  linked-issue:
    name: Linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Check body for "Closes #N" or "Fixes #N"
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' <<< "$BODY"; then
            echo "ok"
          else
            echo "::error::le body de la PR doit contenir 'Closes #N' (ou Fixes/Resolves)"
            exit 1
          fi
