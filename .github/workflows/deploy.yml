name: Deploy

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - '.specify/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      env:
        description: 'cible (prod|preprod)'
        required: true
        type: choice
        options: [prod, preprod]
      rollback:
        description: 'rollback uniquement (pas de build)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  resolve:
    name: Resolve env + tags
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set.outputs.env }}
      image_tag: ${{ steps.set.outputs.image_tag }}
      rollback: ${{ steps.set.outputs.rollback }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.env }}"
            ROLLBACK="${{ inputs.rollback }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV=prod; ROLLBACK=false
          else
            ENV=preprod; ROLLBACK=false
          fi
          TAG=$( [[ "$ENV" == prod ]] && echo main || echo dev )
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "rollback=$ROLLBACK" >> $GITHUB_OUTPUT

  build:
    name: Build & push image
    if: needs.resolve.outputs.rollback != 'true'
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: name
        env:
          IMG: ${{ env.IMAGE_NAME }}
        run: echo "name=${IMG,,}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.name.outputs.name }}:${{ needs.resolve.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.name.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy ${{ needs.resolve.outputs.env }} on VPS
    needs: [resolve, build]
    if: always() && (needs.build.result == 'success' || needs.resolve.outputs.rollback == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ needs.resolve.outputs.env }}
      url: ${{ needs.resolve.outputs.env == 'prod' && 'https://kbrdn.dev' || 'https://pre-prod.kbrdn.dev' }}
    steps:
      - name: Setup ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Compute image ref
        id: img
        env:
          IMG: ${{ env.IMAGE_NAME }}
          TAG: ${{ needs.resolve.outputs.image_tag }}
        run: echo "ref=ghcr.io/${IMG,,}:${TAG}" >> $GITHUB_OUTPUT

      - name: Deploy via ssh wrapper
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          ENV: ${{ needs.resolve.outputs.env }}
          IMAGE: ${{ steps.img.outputs.ref }}
          ACTION: ${{ needs.resolve.outputs.rollback == 'true' && 'rollback' || 'deploy' }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NUXT_STUDIO_TOKEN: ${{ secrets.NUXT_STUDIO_TOKEN }}
        run: |
          REMOTE_CMD="ENV=$ENV IMAGE=$IMAGE GITHUB_TOKEN=$GH_TOKEN RESEND_API_KEY=$RESEND_API_KEY NUXT_STUDIO_TOKEN=$NUXT_STUDIO_TOKEN $ACTION"
          ssh -o BatchMode=yes -o ConnectTimeout=20 "$VPS_USER@$VPS_HOST" "$REMOTE_CMD"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy ${{ needs.resolve.outputs.env }}"
            echo "- ref: \`${{ github.ref }}\`"
            echo "- sha: \`${{ github.sha }}\`"
            echo "- image: \`${{ steps.img.outputs.ref }}\`"
            echo "- action: ${{ needs.resolve.outputs.rollback == 'true' && 'rollback' || 'deploy' }}"
            echo "- url: ${{ needs.resolve.outputs.env == 'prod' && 'https://kbrdn.dev' || 'https://pre-prod.kbrdn.dev' }}"
          } >> $GITHUB_STEP_SUMMARY
