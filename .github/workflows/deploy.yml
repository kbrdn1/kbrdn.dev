name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - '.specify/**'

  # T020: Manual deployment trigger
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip dependency cache'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_ENV: production

jobs:
  # Build job - validate code compiles correctly
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # T019: Caching configuration for Bun dependencies
      - name: Cache Bun dependencies
        if: ${{ github.event.inputs.skip_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint
        continue-on-error: true

      - name: Type check
        run: bun run typecheck
        continue-on-error: true

      - name: Build application
        run: bun run build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Verify build output
        run: |
          if [ ! -d ".output" ]; then
            echo "::error::Build output directory not found"
            exit 1
          fi
          echo "Build output size: $(du -sh .output | cut -f1)"

  # T018: Deploy job with Dokploy webhook trigger
  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Trigger Dokploy deployment
        id: deploy
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "::error::DOKPLOY_WEBHOOK_URL secret is not configured"
            exit 1
          fi

          echo "Triggering deployment to Dokploy..."

          # T021: Error handling with retries
          MAX_RETRIES=3
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."

            HTTP_CODE=$(curl -X POST "$DOKPLOY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -w "%{http_code}" \
              -o /tmp/deploy_response.txt \
              --silent \
              --max-time 60)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Deployment triggered successfully (HTTP $HTTP_CODE)"
              echo "deployment_status=success" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "::warning::Deployment attempt $i failed with HTTP $HTTP_CODE"
              cat /tmp/deploy_response.txt 2>/dev/null || true

              if [ $i -lt $MAX_RETRIES ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              fi
            fi
          done

          echo "::error::All deployment attempts failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # T021: Notification job for deployment status
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "status=build_failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "status=deploy_failed" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
            echo "emoji=❓" >> $GITHUB_OUTPUT
          fi

      - name: Create status summary
        run: |
          echo "## ${{ steps.status.outputs.emoji }} Deployment ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
