name: Studio Content Sync

on:
  push:
    branches:
      - main
    paths:
      - 'app/content/**'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    name: Sync Content Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for content changes
        id: content-check
        run: |
          # Get changed files in content directory
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'app/content/' 2>/dev/null || echo "")

          if [ -n "$CHANGED" ]; then
            echo "content_changed=true" >> $GITHUB_OUTPUT
            echo "Changed content files:"
            echo "$CHANGED"
          else
            echo "content_changed=false" >> $GITHUB_OUTPUT
            echo "No content changes detected"
          fi

      - name: Trigger deployment
        if: steps.content-check.outputs.content_changed == 'true'
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -n "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "Triggering Dokploy deployment for content changes..."
            curl -X POST "$DOKPLOY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              --fail --silent --show-error \
              --max-time 30 \
              --retry 3 \
              --retry-delay 5
            echo "Deployment triggered successfully"
          else
            echo "DOKPLOY_WEBHOOK_URL not configured - skipping deployment"
          fi
