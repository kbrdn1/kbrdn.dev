# gwm — worktree config for kbrdn.dev-v2 (Nuxt)
#
# base mirrors Zed's default git.worktree_directory = "../worktrees": Zed
# resolves it relative to the repo then appends the repo dir name
# (zed-industries/zed#53673), so worktrees land in <repo_parent>/worktrees/
# <repo>/… — gwm and Zed's native worktree picker share the same location.
# Needs gwm ≥ the {repo_parent} placeholder (gwm-cli#176).
# Docs: https://github.com/kbrdn1/gwm-cli

[worktree]
base           = "{repo_parent}/worktrees/{repo}"
path_pattern   = "{type}-{issue}-{desc}"
branch_pattern = "{type}/#{issue}-{desc}"

# node_modules must never be a symlink shared across worktrees: parallel
# installs/builds clobber each other's dependency tree (Nuxt analog of the
# vendor/ isolation in the Laravel repos).
[[bootstrap.no_symlink]]
path = "node_modules"

# ── exec / clean profiles for the TUI overlays (x / X) — issue #325 ──────────
[exec.profiles.dev]
command = ["npm", "run", "dev"]
[exec.profiles.build]
command = ["npm", "run", "build"]
[exec.profiles.generate]
command = ["npm", "run", "generate"]
[exec.profiles.lint]
command = ["npm", "run", "lint"]
[exec.profiles.typecheck]
command = ["npm", "run", "typecheck"]

[clean.profiles.node]
dirs = ["node_modules", "dist", ".nuxt", ".cache", "build"]
